name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: typecheck + tests + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run tests (vitest)
        run: npm test

      - name: npm audit (production deps)
        # --audit-level=high: só falha em high ou critical.
        # Deps transitivas com vulnerabilidades moderadas não bloqueiam merge.
        # TODO: upgrade jspdf 2.5.2 → 4.x (breaking: import { jsPDF } vs
        # default import). Pendente de teste manual de geracao de PDFs
        # (etiqueta interna, separacao, estoque). Risco operacional alto
        # sem QA do PDF em browser real.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
