<!doctype html>
<!--
  lang="pt-BR" + translate="no" + <meta name="google" content="notranslate">
  evitam que o Chrome/Google Tradutor troque nos de texto do DOM em tempo real.
  Sem isso, o tradutor reescreve text nodes enquanto o React reconcilia o
  virtual DOM, e aparece o erro "Falha ao executar 'insertBefore' em 'Node'".
-->
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />

    <meta name="description" content="Sistema de vendas Ecoferro">
    <meta name="author" content="Ecoferro" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/ecoferro-logo.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/ecoferro-logo.png">
    <meta property="og:title" content="Vendas ">
  <meta name="twitter:title" content="Vendas ">
  <meta property="og:description" content="Sistema de vendas Ecoferro">
  <meta name="twitter:description" content="Sistema de vendas Ecoferro">
  <link rel="icon" type="image/png" sizes="96x96" href="/menu-ecoferro-logo-96.png">
</head>

</html>
